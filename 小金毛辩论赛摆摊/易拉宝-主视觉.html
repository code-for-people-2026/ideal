<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>易拉宝 · 主视觉 80×200cm</title>
<style>
  :root{
    --bg:#fbfaf6; --ink:#1a1a1a; --muted:#5a5a5a; --dim:#8a8a8a;
    --accent:#8b1e2d; --green:#2d6a3f; --gold:#b08d2e; --border:#cfcabf;
  }
  @page{ size:800mm 2000mm; margin:0; }
  *{ box-sizing:border-box; }
  html,body{ margin:0; }
  body{ background:#ddd9d1;
    font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB","Microsoft YaHei","Noto Sans SC",sans-serif;
    color:var(--ink); -webkit-font-smoothing:antialiased; }
  .banner{ width:800mm; height:2000mm; margin:0 auto; background:var(--bg); position:relative;
    padding:70mm 60mm; display:flex; flex-direction:column; }
  @media screen{ .banner{ box-shadow:0 6px 40px rgba(0,0,0,.25); margin:20px auto; } }

  .kicker{ font-size:42pt; letter-spacing:.22em; color:var(--accent); font-weight:700; }
  h1{ font-size:150pt; line-height:1.06; margin:14mm 0 0; letter-spacing:-.01em; }
  h1 .hl{ color:var(--accent); }
  .brandline{ font-size:54pt; color:var(--muted); margin:12mm 0 0; font-weight:300; }
  .brandline b{ color:var(--ink); font-weight:700; }

  .hr{ height:4px; background:var(--accent); margin:24mm 0 16mm; width:100%; }

  .yang-h{ font-size:60pt; color:var(--accent); font-weight:700; margin:0 0 10mm; }
  .pts{ display:grid; grid-template-columns:1fr 1fr; gap:10mm 14mm; }
  .pt{ }
  .pt .t{ font-size:46pt; font-weight:700; line-height:1.1; }
  .pt .x{ font-size:27pt; color:var(--muted); line-height:1.35; margin-top:4mm; }

  .rule{ font-size:48pt; line-height:1.4; margin:22mm 0 0; }
  .rule b{ color:var(--green); }

  .spacer{ flex:1 1 auto; }

  .qzone{ display:flex; gap:26mm; align-items:center; }
  .qr{ width:150mm; height:150mm; background:#fff; border:2px solid var(--border); border-radius:8mm;
       display:flex; align-items:center; justify-content:center; text-align:center; font-size:26pt; color:var(--dim); line-height:1.3; }
  .qcap{ font-size:34pt; line-height:1.5; color:var(--muted); }
  .qcap b{ color:var(--ink); }

  .foot{ margin-top:18mm; border-top:2px solid var(--border); padding-top:8mm; display:flex; justify-content:space-between; align-items:baseline; }
  .brand{ font-size:44pt; font-weight:700; color:var(--accent); }
  .brand span{ color:var(--muted); font-weight:400; font-size:30pt; }
  .tag{ font-size:28pt; color:var(--dim); }
</style>
</head>
<body>
<div class="banner">
  <div class="kicker">数据平权 · AI 下乡</div>
  <h1>软件是一种服务<br>我们想把它<br><span class="hl">还给人民</span></h1>
  <div class="brandline"><b>《数据平权宣言》</b></div>

  <div class="hr"></div>

  <div class="yang-h">这是一个阳谋 —— 全部公开，资本也跟不了</div>
  <div class="pts">
    <div class="pt"><div class="t">① 工资 1:3 封顶</div><div class="x">最高 ≤ 最低 ×3，章程永恒条款</div></div>
    <div class="pt"><div class="t">② 只接受捐款</div><div class="x">创始人投入也不可回收</div></div>
    <div class="pt"><div class="t">③ 没有 exit</div><div class="x">不上市不套现，资产归社会</div></div>
    <div class="pt"><div class="t">④ 数量级重写治理</div><div class="x">3→30→300，规则不漂移</div></div>
  </div>

  <div class="rule">AI 让生产力过剩。<br>谁把红利<b>还给人民</b>，谁就赢。</div>

  <div class="spacer"></div>

  <div class="qzone">
    <div class="qr">微信二维码<br>（待替换）</div>
    <div class="qr">自媒体矩阵<br>（待替换）</div>
    <div class="qcap"><b>扫码加我们 · 看我们的过程</b><br>桌上有 7×7 地图、宣言传单<br>和需求登记表，欢迎来 grill 我们。</div>
  </div>

  <div class="foot">
    <div class="brand">（团队名待定）</div>
    <div class="tag">端午 · 华语辩坛小友赛</div>
  </div>
</div>
</body>
</html>
