<svg xmlns="http://www.w3.org/2000/svg" width="800mm" height="2000mm" viewBox="0 0 680 1700" role="img">
<title>易拉宝主视觉 · 数据平权、AI 下乡</title>
<desc>80×200cm 竖版易拉宝：软件是一种服务，我们想把它还给人民。含四条阳谋自缚、规律金句、二维码区与页脚。</desc>
<g font-family="PingFang SC, Hiragino Sans GB, Microsoft YaHei, Noto Sans SC, -apple-system, sans-serif">

  <rect x="0" y="0" width="680" height="1700" fill="#fbfaf6"/>

  <rect x="0" y="0" width="680" height="380" fill="#8b1e2d"/>
  <text x="56" y="98" font-size="19" font-weight="500" letter-spacing="6" fill="#e7c87d">数据平权 · AI 下乡</text>
  <text x="56" y="206" font-size="56" font-weight="700" fill="#ffffff">软件也是一种<tspan font-size="80" fill="#f2d07c">服务</tspan></text>
  <text x="56" y="322" font-size="56" font-weight="700" fill="#ffffff"><tspan font-size="80" fill="#f2d07c">为</tspan>何不还给<tspan font-size="80" fill="#f2d07c">人民</tspan></text>

  <text x="56" y="456" font-size="26" font-weight="700" fill="#8b1e2d">《数据平权宣言》</text>
  <text x="56" y="486" font-size="18" font-weight="400" fill="#5a5a5a">一个公开的、欢迎质疑的阳谋</text>
  <line x1="56" y1="506" x2="624" y2="506" stroke="#d4d0c8" stroke-width="1"/>

  <text x="56" y="552" font-size="26" font-weight="700" fill="#8b1e2d">我们主张四件事</text>
  <text x="56" y="582" font-size="18" font-weight="400" fill="#5a5a5a">在 AI 生产力彻底爆发之前，把 AI 的红利，还给普罗大众</text>

  <circle cx="76" cy="640" r="21" fill="none" stroke="#b08d2e" stroke-width="2"/>
  <text x="76" y="650" font-size="26" font-weight="700" fill="#b08d2e" text-anchor="middle">1</text>
  <text x="116" y="640" font-size="26" font-weight="700" fill="#1a1a1a">数据属于用户</text>
  <text x="116" y="668" font-size="18" font-weight="400" fill="#5a5a5a">盈利向全体用户分红 —— 看的人、创作的人都分</text>

  <circle cx="76" cy="734" r="21" fill="none" stroke="#b08d2e" stroke-width="2"/>
  <text x="76" y="744" font-size="26" font-weight="700" fill="#b08d2e" text-anchor="middle">2</text>
  <text x="116" y="734" font-size="26" font-weight="700" fill="#1a1a1a">AI 下乡</text>
  <text x="116" y="762" font-size="18" font-weight="400" fill="#5a5a5a">仿家电下乡 —— 用过剩的算力，挖普罗大众的需求</text>

  <circle cx="76" cy="828" r="21" fill="none" stroke="#b08d2e" stroke-width="2"/>
  <text x="76" y="838" font-size="26" font-weight="700" fill="#b08d2e" text-anchor="middle">3</text>
  <text x="116" y="828" font-size="26" font-weight="700" fill="#1a1a1a">普及 AI 教育，防范 AI 资本</text>
  <text x="116" y="856" font-size="18" font-weight="400" fill="#5a5a5a">别重蹈土地、工业、金融、互联网资本的覆辙</text>

  <circle cx="76" cy="922" r="21" fill="none" stroke="#b08d2e" stroke-width="2"/>
  <text x="76" y="932" font-size="26" font-weight="700" fill="#b08d2e" text-anchor="middle">4</text>
  <text x="116" y="922" font-size="26" font-weight="700" fill="#1a1a1a">收入差距 &lt; 3:1</text>
  <text x="116" y="950" font-size="18" font-weight="400" fill="#5a5a5a">数字收入与可支配收入，差距都 &lt; 3 倍（内部示范）</text>

  <rect x="56" y="1030" width="568" height="172" rx="8" fill="#f3e7e9"/>
  <rect x="56" y="1030" width="6" height="172" fill="#8b1e2d"/>
  <text x="88" y="1098" font-size="29" font-weight="500" fill="#1a1a1a">AI 让算力与产能过剩。</text>
  <text x="88" y="1152" font-size="34" font-weight="700" fill="#1a1a1a">谁把红利<tspan fill="#8b1e2d">还给人民</tspan>，谁就赢。</text>

  <rect x="56" y="1252" width="150" height="150" rx="10" fill="#ffffff" stroke="#d4d0c8" stroke-width="1.5"/>
  <rect x="70" y="1266" width="30" height="30" rx="3" fill="none" stroke="#c9c4ba" stroke-width="5"/>
  <rect x="162" y="1266" width="30" height="30" rx="3" fill="none" stroke="#c9c4ba" stroke-width="5"/>
  <rect x="70" y="1358" width="30" height="30" rx="3" fill="none" stroke="#c9c4ba" stroke-width="5"/>
  <text x="131" y="1338" font-size="17" font-weight="400" fill="#8a8a8a" text-anchor="middle">待替换</text>
  <text x="131" y="1430" font-size="19" font-weight="700" fill="#1a1a1a" text-anchor="middle">加微信</text>

  <rect x="230" y="1252" width="150" height="150" rx="10" fill="#ffffff" stroke="#d4d0c8" stroke-width="1.5"/>
  <rect x="244" y="1266" width="30" height="30" rx="3" fill="none" stroke="#c9c4ba" stroke-width="5"/>
  <rect x="336" y="1266" width="30" height="30" rx="3" fill="none" stroke="#c9c4ba" stroke-width="5"/>
  <rect x="244" y="1358" width="30" height="30" rx="3" fill="none" stroke="#c9c4ba" stroke-width="5"/>
  <text x="305" y="1338" font-size="17" font-weight="400" fill="#8a8a8a" text-anchor="middle">待替换</text>
  <text x="305" y="1430" font-size="19" font-weight="700" fill="#1a1a1a" text-anchor="middle">自媒体矩阵</text>

  <text x="420" y="1300" font-size="20" font-weight="500" fill="#1a1a1a">扫码加我们</text>
  <text x="420" y="1332" font-size="18" font-weight="400" fill="#5a5a5a">看我们的过程</text>
  <text x="420" y="1360" font-size="18" font-weight="400" fill="#5a5a5a">（失败也公开）</text>

  <text x="56" y="1494" font-size="18" font-weight="400" fill="#5a5a5a">桌上有 7×7 地图、宣言传单与需求登记表，</text>
  <text x="56" y="1524" font-size="18" font-weight="400" fill="#5a5a5a">欢迎来 grill 我们。</text>

  <line x1="56" y1="1576" x2="624" y2="1576" stroke="#d4d0c8" stroke-width="1"/>
  <text x="56" y="1622" font-size="22" font-weight="700" fill="#8b1e2d">（团队名待定）</text>
  <text x="624" y="1622" font-size="16" font-weight="400" fill="#8a8a8a" text-anchor="end">端午 · 华语辩坛小友赛</text>

</g>
</svg>
