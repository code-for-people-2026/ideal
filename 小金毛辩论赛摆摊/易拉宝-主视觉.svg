<svg xmlns="http://www.w3.org/2000/svg" width="806mm" height="2006mm" viewBox="-2.55 -2.55 685.1 1705.1" role="img">
<title>易拉宝主视觉 · 数据平权、AI 下乡</title>
<desc>80×200cm 竖版易拉宝：软件是一种服务，我们想把它还给人民。含三条主张+一条约束、打法金句、7×7 地图引导、二维码区与页脚。</desc>
<g font-family="PingFang SC, Hiragino Sans GB, Microsoft YaHei, Noto Sans SC, -apple-system, sans-serif">

  <rect x="-3" y="-3" width="686" height="1706" fill="#fbfaf6"/>

  <rect x="-3" y="-3" width="686" height="383" fill="#8b1e2d"/>
  <text x="56" y="98" font-size="19" font-weight="500" letter-spacing="6" fill="#e7c87d">数据平权 · AI 下乡</text>
  <!-- 主标题：金色大字按横向位置左→右 = 为·人民·服务（为人民服务视觉错觉）；小字何不/还给嵌中间，字面读「为何不还给人民」 -->
  <text x="56" y="206" font-size="52" font-weight="700" fill="#ffffff">软件服务也是一种<tspan font-size="76" fill="#f2d07c">服务</tspan></text>
  <text x="56" y="322" font-size="76" font-weight="700" fill="#f2d07c">为</text>
  <text x="150" y="299" font-size="33" font-weight="700" fill="#ffffff">何不</text>
  <text x="150" y="337" font-size="33" font-weight="700" fill="#ffffff">还给</text>
  <text x="234" y="322" font-size="76" font-weight="700" fill="#f2d07c">人民</text>

  <text x="56" y="456" font-size="26" font-weight="700" fill="#8b1e2d">《数据平权宣言》</text>
  <text x="56" y="486" font-size="18" font-weight="400" fill="#5a5a5a">一个公开的、欢迎质疑的阳谋</text>
  <line x1="56" y1="506" x2="624" y2="506" stroke="#d4d0c8" stroke-width="1"/>

  <text x="56" y="552" font-size="26" font-weight="700" fill="#8b1e2d">我们提出三个主张、一条约束</text>
  <text x="56" y="582" font-size="18" font-weight="400" fill="#5a5a5a">在 AI 生产力彻底爆发之前，把 AI 的时代红利，还给普罗大众</text>

  <circle cx="76" cy="640" r="21" fill="none" stroke="#b08d2e" stroke-width="2"/>
  <text x="76" y="650" font-size="26" font-weight="700" fill="#b08d2e" text-anchor="middle">1</text>
  <text x="116" y="640" font-size="26" font-weight="700" fill="#1a1a1a">数据属于用户</text>
  <text x="116" y="668" font-size="18" font-weight="400" fill="#5a5a5a">你的点击、轨迹是劳动，不是平台地租——该还你一份</text>

  <circle cx="76" cy="734" r="21" fill="none" stroke="#b08d2e" stroke-width="2"/>
  <text x="76" y="744" font-size="26" font-weight="700" fill="#b08d2e" text-anchor="middle">2</text>
  <text x="116" y="734" font-size="26" font-weight="700" fill="#1a1a1a">AI 下乡</text>
  <text x="116" y="762" font-size="18" font-weight="400" fill="#5a5a5a">仿家电下乡 —— 用过剩的算力，挖普罗大众的需求</text>

  <circle cx="76" cy="828" r="21" fill="none" stroke="#b08d2e" stroke-width="2"/>
  <text x="76" y="838" font-size="26" font-weight="700" fill="#b08d2e" text-anchor="middle">3</text>
  <text x="116" y="828" font-size="26" font-weight="700" fill="#1a1a1a">普及 AI 教育，防范 AI 资本</text>
  <text x="116" y="856" font-size="18" font-weight="400" fill="#5a5a5a">别重蹈土地、工业、金融、互联网资本的覆辙</text>

  <circle cx="76" cy="922" r="21" fill="none" stroke="#b08d2e" stroke-width="2"/>
  <text x="76" y="932" font-size="26" font-weight="700" fill="#b08d2e" text-anchor="middle">4</text>
  <text x="116" y="922" font-size="26" font-weight="700" fill="#1a1a1a">我们先约束自己</text>
  <text x="116" y="950" font-size="18" font-weight="400" fill="#5a5a5a">收入差距&lt;3:1 · 只接受捐款 · 不套现 · 资产归社会</text>

  <rect x="56" y="1030" width="568" height="172" rx="8" fill="#f3e7e9"/>
  <rect x="56" y="1030" width="6" height="172" fill="#8b1e2d"/>
  <text x="88" y="1098" font-size="29" font-weight="500" fill="#1a1a1a">不跟平台抢山头。</text>
  <text x="88" y="1152" font-size="34" font-weight="700" fill="#1a1a1a">从平台<tspan fill="#8b1e2d">顾不上的边角</tspan>做起。</text>

  <rect x="56" y="1252" width="118" height="118" rx="9" fill="#ffffff" stroke="#d4d0c8" stroke-width="1.5"/>
  <image href="./wechat-group-qr.jpg" x="62" y="1258" width="106" height="106" preserveAspectRatio="xMidYMid meet"/>
  <text x="115" y="1398" font-size="17" font-weight="700" fill="#1a1a1a" text-anchor="middle">微信群</text>

  <rect x="196" y="1252" width="118" height="118" rx="9" fill="#ffffff" stroke="#d4d0c8" stroke-width="1.5"/>
  <image href="./bilibili-qr.png" x="202" y="1258" width="106" height="106" preserveAspectRatio="xMidYMid meet"/>
  <text x="255" y="1398" font-size="17" font-weight="700" fill="#1a1a1a" text-anchor="middle">B站</text>

  <rect x="336" y="1252" width="118" height="118" rx="9" fill="#ffffff" stroke="#d4d0c8" stroke-width="1.5"/>
  <image href="./douyin-qr.jpg" x="342" y="1258" width="106" height="106" preserveAspectRatio="xMidYMid meet"/>
  <text x="395" y="1398" font-size="17" font-weight="700" fill="#1a1a1a" text-anchor="middle">抖音</text>

  <rect x="476" y="1252" width="118" height="118" rx="9" fill="#ffffff" stroke="#d4d0c8" stroke-width="1.5"/>
  <image href="./kuaishou-qr.jpg" x="482" y="1258" width="106" height="106" preserveAspectRatio="xMidYMid meet"/>
  <text x="535" y="1398" font-size="17" font-weight="700" fill="#1a1a1a" text-anchor="middle">快手</text>

  <text x="56" y="1450" font-size="18" font-weight="500" fill="#1a1a1a">扫码进群，或关注 B站 / 抖音 / 快手，看我们的过程。</text>

  <text x="56" y="1504" font-size="18" font-weight="400" fill="#5a5a5a">桌上有「牛马能力剥夺图」：7 类工友 × 7 样被剥夺的能力，</text>
  <text x="56" y="1534" font-size="18" font-weight="400" fill="#5a5a5a">49 个还没人认真做的方向——欢迎来挑刺、填空白格。</text>

  <line x1="56" y1="1576" x2="624" y2="1576" stroke="#d4d0c8" stroke-width="1"/>
  <text x="56" y="1622" font-size="22" font-weight="700" fill="#8b1e2d">码成工</text>
  <text x="56" y="1654" font-size="15" font-weight="400" fill="#6b6b6b">一个为工友敲键盘的组织</text>
  <text x="624" y="1622" font-size="16" font-weight="400" fill="#6b6b6b" text-anchor="end">端午 · 华语辩坛小友赛</text>

</g>
</svg>
